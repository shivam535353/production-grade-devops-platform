# =============================================================================
# production-grade-devops-platform — Kubernetes Service
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: devops-platform-svc
  namespace: default
  labels:
    app: devops-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: devops-platform
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
