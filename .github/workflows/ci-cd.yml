# =============================================================================
# production-grade-devops-platform — GitHub Actions CI/CD Pipeline
# GitHub : https://github.com/shivam535353/production-grade-devops-platform
#
# Save this file at:  .github/workflows/ci-cd.yml
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Test
  # ---------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Flask app starts
        env:
          APP_ENV: testing
          SECRET_KEY: ci-test-secret-key
        run: |
          python -c "
          from app import create_app
          app = create_app('testing')
          with app.test_client() as c:
              for ep in ['/', '/health', '/info', '/version', '/metrics', '/tech-stack', '/developer']:
                  r = c.get(ep)
                  assert r.status_code == 200, f'FAILED {ep}: {r.status_code}'
                  print(f'PASS {ep}')
          print('All endpoints healthy.')
          "

  # ---------------------------------------------------------------------------
  # Job 2: Security Scan
  # ---------------------------------------------------------------------------
  security:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0
          continue-on-error: true

  # ---------------------------------------------------------------------------
  # Job 3: Build & Push
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
